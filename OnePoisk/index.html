<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePoisk — найдётся всё!</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <svg viewBox="0 0 200 60" class="logo-svg">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#fc0;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#f00;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle cx="30" cy="30" r="25" fill="url(#logoGradient)"/>
                        <text x="65" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#000">OnePoisk</text>
                    </svg>
                </a>
            </div>
            <div class="header-right">
                <button class="voice-btn" id="voiceBtn" title="Голосовой поиск">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div class="oink-id" id="oinkIdBtn">
                    <img src="assets/default-avatar.svg" alt="Oink ID" class="avatar" id="headerAvatar">
                    <span class="username" id="headerUsername">Войти</span>
                </div>
                <button class="incognito-btn" id="incognitoBtn" title="Режим инкогнито">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9c.83 0 1.5-.67 1.5-1.5S7.83 8 7 8s-1.5.67-1.5 1.5S6.17 11 7 11zm3.5 3c-.83 0-1.5-.67-1.5-1.5S9.67 11 10.5 11s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm3.5-3c.83 0 1.5-.67 1.5-1.5S14.83 8 14 8s-1.5.67-1.5 1.5.67 1.5 1.5 1.5zM12 16c2.03 0 3.8-1.11 4.75-2.75-.45-.17-.92-.25-1.41-.25-.35 0-.69.04-1.02.11C13.58 14.27 12.84 15 12 15s-1.58-.73-2.32-1.89c-.33-.07-.67-.11-1.02-.11-.49 0-.96.08-1.41.25C8.2 14.89 9.97 16 12 16z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Top Ad Block -->
    <div class="topAdPad">
        <div id="movie_video"></div>
        <script type="text/javascript" src="https://vak345.com/s.js?v=03208824be369b060dba1f2083d6a4c" async></script>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div class="search-container">
            <form class="search-form" id="searchForm">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="Найдётся всё..." autocomplete="off">
                    <button type="submit" class="search-submit">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                    <button type="button" class="voice-search-btn" id="voiceSearchBtn">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Services Grid -->
        <div class="services-grid" id="servicesGrid">
            <!-- Services will be dynamically loaded -->
        </div>

        <!-- Ads in content -->
        <div class="content-ad">
            <div class="ad-label">Реклама</div>
            <div class="ad-content">
                <div id="ad_container_1"></div>
                <script type="text/javascript" src="https://vak345.com/s.js?v=03208824be369b060dba1f2083d6a4c" async></script>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="docs/faq.html">FAQ</a>
                <a href="docs/policy.html">Политика конфиденциальности</a>
                <a href="docs/terms.html">Условия использования</a>
                <a href="docs/docs.html">Документация</a>
                <a href="landing.html">О проекте</a>
            </div>
            <div class="footer-copyright">
                © 2024 OnePoisk. Все права защищены.
            </div>
        </div>
    </footer>

    <!-- Modal for websites -->
    <div class="modal" id="websiteModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Заголовок</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <iframe id="modalIframe" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- Oink ID Modal -->
    <div class="modal" id="oinkModal">
        <div class="modal-overlay"></div>
        <div class="modal-content oink-modal">
            <div class="modal-header">
                <h3>Oink ID</h3>
                <button class="modal-close" id="oinkModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="oink-profile" id="oinkProfile">
                    <div class="profile-avatar">
                        <img src="assets/default-avatar.svg" alt="Avatar" id="profileAvatar">
                        <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                        <button class="upload-avatar-btn" id="uploadAvatarBtn">📷</button>
                    </div>
                    <input type="text" class="nickname-input" id="nicknameInput" placeholder="Введите никнейм">
                    <div class="coins-display">
                        <span class="coins-icon">🪙</span>
                        <span id="coinsCount">0</span> монет
                    </div>
                    <div class="one-pro-section">
                        <h4>One Pro</h4>
                        <p>Подписка без рекламы на 14 дней</p>
                        <button class="buy-pro-btn" id="buyProBtn">Купить за 100 монет</button>
                    </div>
                    <div class="daily-bonus">
                        <button class="daily-bonus-btn" id="dailyBonusBtn">Забрать ежедневный бонус</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bookmarks Modal -->
    <div class="modal" id="bookmarksModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Закладки</h3>
                <button class="modal-close" id="bookmarksModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="bookmarks-list" id="bookmarksList"></div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
